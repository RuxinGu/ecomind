services:
  - type: web
    name: ecomind-api
    env: node
    rootDir: apps/backend
    plan: starter
    buildCommand: npm install
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ecomind-postgres
          property: connectionString
      - key: PGSSL
        value: "true"
      - key: CORS_ORIGIN
        sync: false
      - key: BCRYPT_ROUNDS
        value: "12"

  - type: web
    name: boba-garden-orders
    runtime: node
    rootDir: apps/boba-order
    plan: starter
    buildCommand: npm install
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
    disk:
      name: order-data
      mountPath: /var/data
      sizeGB: 1

databases:
  - name: ecomind-postgres
    plan: starter
