services:
  - type: web
    name: ecomind-api
    env: node
    rootDir: apps/backend
    plan: starter
    buildCommand: npm install
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ecomind-postgres
          property: connectionString
      - key: PGSSL
        value: "true"
      - key: CORS_ORIGIN
        sync: false
      - key: BCRYPT_ROUNDS
        value: "12"

databases:
  - name: ecomind-postgres
    plan: starter
