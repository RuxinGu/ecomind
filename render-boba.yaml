services:
  - type: web
    name: boba-garden-orders
    runtime: node
    rootDir: apps/boba-order
    plan: starter
    buildCommand: npm install
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
    disk:
      name: order-data
      mountPath: /var/data
      sizeGB: 1
