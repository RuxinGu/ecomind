services:
  - type: web
    name: boba-garden-orders
    runtime: node
    rootDir: apps/boba-order
    plan: starter
    buildCommand: npm install
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
      - key: PUBLIC_URL
        value: https://boba-garden-orders.onrender.com
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
    disk:
      name: order-data
      mountPath: /var/data
      sizeGB: 1
